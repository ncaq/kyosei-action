name: Kyosei Code Review
author: ncaq
description: Multi-perspective AI code review for pull requests using the Kyosei plugin from Konoka marketplace

branding:
  icon: "check-square"
  color: "blue"

inputs:
  # Authentication (at least one required).
  # Typically only one is needed.
  # If multiple are provided they are passed through to claude-code-action as-is.
  claude_code_oauth_token:
    description: Claude Code OAuth token
    required: false
    default: ""
  anthropic_api_key:
    description: Anthropic API key (alternative to OAuth token)
    required: false
    default: ""
  use_bedrock:
    description: Use Amazon Bedrock with OIDC authentication
    required: false
    default: "false"
  use_vertex:
    description: Use Google Vertex AI with OIDC authentication
    required: false
    default: "false"
  use_foundry:
    description: Use Microsoft Foundry with OIDC authentication
    required: false
    default: "false"
  custom_github_token:
    description: >-
      GitHub token for API access.
      If omitted, claude-code-action uses Claude GitHub App token (claude[bot]).
      Provide explicitly to use a custom token or github.token instead.
      Named custom_github_token to avoid the reserved github_token input name.
    required: false
    default: ""

  # Claude Code Action pass-through
  allowed_bots:
    description: >-
      Comma-separated list of allowed bot usernames, or '*' to allow all bots.
      Defaults to '*' because bots are not inherently more dangerous than humans.
    required: false
    default: "*"
  allowed_non_write_users:
    description: >-
      Comma-separated list of users without write permission who are allowed to trigger Claude,
      or '*' to allow all. Only works when custom_github_token is provided.
      Enables bubblewrap sandbox and env scrubbing for safety.
    required: false
    default: ""
  include_comments_by_actor:
    description: >-
      Filter to include only comments from specific actors.
      Supports wildcards (e.g. '*[bot]'). Empty means include all.
    required: false
    default: ""
  exclude_comments_by_actor:
    description: >-
      Filter to exclude comments from specific actors.
      Supports wildcards. Exclusion takes precedence over inclusion.
    required: false
    default: ""
  additional_permissions:
    description: >-
      Additional GitHub permissions for the App token (newline-separated 'key: value').
      Example: 'actions: read' enables CI/CD failure analysis.
      Only effective with OIDC token exchange (ignored when custom_github_token is set).
    required: false
    default: ""
  settings:
    description: >-
      Claude Code settings as a JSON string or path to a JSON file.
      Merged with existing settings (input takes precedence).
      Can configure hooks, env, MCP settings, etc.
    required: false
    default: ""

  # Claude Code configuration
  model:
    description: Claude model to use
    required: false
    default: "opus[1m]"
  allowed_tools:
    description: >-
      Allowed tools for Claude Code (newline-separated, replaces default set).
      The defaults broadly allow tools the review agent is likely to need.
      gh api is included because MCP sometimes fails to fetch inline comments.
    required: false
    default: |
      Bash(gh api *issues/*/comments*)
      Bash(gh api *pulls/*/comments*)
      Bash(gh api *pulls/*/reviews*)
      Bash(gh issue:*)
      Bash(gh pr:*)
      Bash(gh search:*)
      Bash(node:*)
      Glob
      Grep
      Read
      WebFetch
      WebSearch
      mcp__github
      mcp__github_inline_comment__create_inline_comment
  additional_allowed_tools:
    description: Additional allowed tools to append to allowed_tools (newline-separated)
    required: false
    default: ""
  claude_args:
    description: Additional arguments to pass to Claude CLI (appended after --model and --allowed-tools)
    required: false
    default: ""

  # UI control
  include_fix_links:
    description: Include 'Fix this' deep links in PR review feedback
    required: false
    default: "true"
  display_report:
    description: >-
      Display Claude Code Report in GitHub Step Summary.
      Useful for understanding what Claude did during the review.
      "auto" (default) enables it only for private repositories.
      Can be explicitly set to "true" on public repositories if secrets are properly managed.
    required: false
    default: "auto"
  show_full_output:
    description: >-
      Show full Claude Code JSON output in Actions logs.
      May contain secrets in tool results; use only for debugging.
      Ignored on public repositories to prevent secret leakage.
    required: false
    default: "false"

  # Marketplace and plugin
  marketplace_url:
    description: Git URL of the plugin marketplace
    required: false
    default: "https://github.com/ncaq/konoka.git"
  plugin_name:
    description: Plugin identifier within the marketplace (newline-separated for multiple)
    required: false
    default: |-
      kyosei@konoka
      research@konoka

outputs:
  execution_file:
    description: Path to the Claude Code execution output file
    value: ${{ steps.claude-review.outputs.execution_file }}
  session_id:
    description: Claude Code session ID for resuming conversation
    value: ${{ steps.claude-review.outputs.session_id }}

runs:
  using: composite
  steps:
    - name: Validate inputs
      shell: bash
      env:
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude_code_oauth_token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        USE_BEDROCK: ${{ inputs.use_bedrock }}
        USE_VERTEX: ${{ inputs.use_vertex }}
        USE_FOUNDRY: ${{ inputs.use_foundry }}
        MARKETPLACE_URL: ${{ inputs.marketplace_url }}
        PLUGIN_NAME: ${{ inputs.plugin_name }}
        MODEL: ${{ inputs.model }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        echo "::group::Validate inputs"
        errors=()

        # Authentication: at least one credential must be provided unless
        # using cloud providers with OIDC.
        if [[ -n "$CLAUDE_CODE_OAUTH_TOKEN" ]]; then
          echo "Authentication: OAuth token"
        elif [[ -n "$ANTHROPIC_API_KEY" ]]; then
          echo "Authentication: API key"
        elif [[ "$USE_BEDROCK" == "true" ]]; then
          echo "Authentication: Amazon Bedrock (OIDC)"
        elif [[ "$USE_VERTEX" == "true" ]]; then
          echo "Authentication: Google Vertex AI (OIDC)"
        elif [[ "$USE_FOUNDRY" == "true" ]]; then
          echo "Authentication: Microsoft Foundry (OIDC)"
        else
          errors+=("Either claude_code_oauth_token, anthropic_api_key, or a cloud provider (use_bedrock/use_vertex/use_foundry) must be set.")
        fi

        # Cloud providers are mutually exclusive.
        provider_count=0
        [[ "$USE_BEDROCK" == "true" ]] && ((provider_count++))
        [[ "$USE_VERTEX" == "true" ]] && ((provider_count++))
        [[ "$USE_FOUNDRY" == "true" ]] && ((provider_count++))
        if (( provider_count > 1 )); then
          errors+=("Only one cloud provider (use_bedrock, use_vertex, use_foundry) can be enabled at a time.")
        fi

        echo "Model: $MODEL"
        echo "Plugin: $PLUGIN_NAME"
        echo "Marketplace: $MARKETPLACE_URL"
        echo "PR: #$PR_NUMBER"

        # Marketplace URL must end with .git (required by claude-code-action).
        if [[ -n "$MARKETPLACE_URL" && "$MARKETPLACE_URL" != *.git ]]; then
          errors+=("marketplace_url must end with '.git': $MARKETPLACE_URL")
        fi

        # Plugin name must not be empty.
        if [[ -z "$PLUGIN_NAME" ]]; then
          errors+=("plugin_name must not be empty.")
        fi

        # Model must not be empty.
        if [[ -z "$MODEL" ]]; then
          errors+=("model must not be empty.")
        fi

        # This action only works on pull_request events.
        if [[ -z "$PR_NUMBER" ]]; then
          errors+=("This action requires a pull_request event context (github.event.pull_request.number is missing).")
        fi

        if (( ${#errors[@]} > 0 )); then
          echo "::endgroup::"
          for error in "${errors[@]}"; do
            echo "::error::$error"
          done
          exit 1
        fi

        echo "All inputs valid."
        echo "::endgroup::"

    - name: Build allowed tools list
      id: build-allowed-tools
      shell: bash
      env:
        ALLOWED_TOOLS: ${{ inputs.allowed_tools }}
        ADDITIONAL_ALLOWED_TOOLS: ${{ inputs.additional_allowed_tools }}
      run: |
        echo "::group::Build allowed tools list"
        # Combine and convert newline-separated tools to comma-separated.
        joined=$(printf '%s\n%s' "$ALLOWED_TOOLS" "$ADDITIONAL_ALLOWED_TOOLS" \
          | sed '/^[[:space:]]*$/d' \
          | paste -sd ',' -)
        echo "Allowed tools: $joined"
        echo "joined=$joined" >> "$GITHUB_OUTPUT"
        echo "::endgroup::"

    - name: Write user request for slash command support
      shell: bash
      env:
        PR_URL: ${{ github.event.pull_request.html_url }}
      run: |
        mkdir -p "${RUNNER_TEMP}/claude-prompts"
        echo "/kyosei ${PR_URL}" > "${RUNNER_TEMP}/claude-prompts/claude-user-request.txt"

    - name: Run Kyosei
      id: claude-review
      continue-on-error: true
      uses: anthropics/claude-code-action@c3d45e8e941e1b2ad7b278c57482d9c5bf1f35b3 # v1.0.99
      with:
        claude_code_oauth_token: ${{ inputs.claude_code_oauth_token }}
        anthropic_api_key: ${{ inputs.anthropic_api_key }}
        use_bedrock: ${{ inputs.use_bedrock }}
        use_vertex: ${{ inputs.use_vertex }}
        use_foundry: ${{ inputs.use_foundry }}
        github_token: ${{ inputs.custom_github_token }} # Pass as-is (empty means claude-code-action uses Claude GitHub App token).
        allowed_bots: ${{ inputs.allowed_bots }}
        allowed_non_write_users: ${{ inputs.allowed_non_write_users }}
        include_comments_by_actor: ${{ inputs.include_comments_by_actor }}
        exclude_comments_by_actor: ${{ inputs.exclude_comments_by_actor }}
        additional_permissions: ${{ inputs.additional_permissions }}
        settings: ${{ inputs.settings }}
        include_fix_links: ${{ inputs.include_fix_links == 'true' && 'true' || 'false' }}
        display_report: ${{ (inputs.display_report == 'auto' && github.event.repository.private || inputs.display_report == 'true') && 'true' || 'false' }}
        show_full_output: ${{ (inputs.show_full_output == 'true' && github.event.repository.private) && 'true' || 'false' }}
        claude_args: >-
          --model "${{ inputs.model }}"
          --allowed-tools "${{ steps.build-allowed-tools.outputs.joined }}"
          ${{ inputs.claude_args }}
        plugin_marketplaces: ${{ inputs.marketplace_url }}
        plugins: ${{ inputs.plugin_name }}
        prompt: "Follow the user request."

    # If claude-code-action fails, emit a warning instead of failing the workflow.
    # Common causes: insufficient token permissions (e.g. workflow file changes
    # in the PR, fork PRs) or transient API errors.
    - name: Handle failure
      if: steps.claude-review.outcome == 'failure'
      shell: bash
      run: |
        echo "::warning::Kyosei failed. This may be due to insufficient token permissions (e.g. workflow file changes in this PR, or fork PRs) or a transient error. Skipping."
